---
version: 2
builds:
  -  # First Build
    env:
      - CGO_ENABLED=0
    main: ./cmd/fleeting-plugin-openstack
    ldflags: >-
      -s -w
      -X github.com/sardinasystems/fleeting-plugin-openstack.Version={{.Version}}
      -X github.com/sardinasystems/fleeting-plugin-openstack.Revision={{.FullCommit}}
      -X github.com/sardinasystems/fleeting-plugin-openstack.Branch={{.Branch}}
      -X github.com/sardinasystems/fleeting-plugin-openstack.BuildUser=goreleaser@github-actions
      -X github.com/sardinasystems/fleeting-plugin-openstack.BuildDate={{time "20060102-15:04:05"}}

    # Set the binary output location to bin/ so archive will comply with Sensu Go Asset structure
    binary: bin/{{ .ProjectName }}
    targets:
      - linux_386
      - linux_amd64
      - linux_arm_7
      - linux_arm64

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_sha512-checksums.txt"
  algorithm: sha512

archives:
  - id: tar
    formats: tar.gz
    files:
      - LICENSE
      - README.md

release:
  # Workflow triggers on `release: published`, so the GitHub release already
  # exists by the time goreleaser runs. Keep the user-authored notes intact
  # and let goreleaser only upload the binaries + checksums.
  mode: keep-existing
  # Make re-runs safe — if an asset upload fails with 422 (already exists),
  # delete the existing asset and retry instead of erroring out.
  replace_existing_artifacts: true
