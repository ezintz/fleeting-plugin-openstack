---
name: release

on:
  release:
    types: [published]

# Default to no permissions; each job opts into what it needs.
permissions: {}

jobs:
  # Strip the leading `v` from the release tag once, so downstream jobs
  # don't each re-implement the same shell snippet.
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  # SLSA3 Go builder: compiles one binary per arch in a hardened runner
  # and uploads the binary + signed in-toto provenance attestation to the
  # GitHub release. Consumers verify with `slsa-verifier`.
  build:
    needs: setup
    permissions:
      id-token: write   # OIDC token for Sigstore keyless signing
      contents: write   # Upload binary + provenance to the release
      actions: read     # SLSA introspects the workflow run for provenance
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.1.0
    with:
      go-version-file: go.mod
      config-file: .slsa-goreleaser/linux-${{ matrix.arch }}.yml
      upload-assets: true
      upload-tag-name: ${{ github.event.release.tag_name }}
      evaluated-envs: "VERSION:${{ needs.setup.outputs.version }},COMMIT:${{ github.sha }}"

  # Assemble a multi-arch OCI image from the SLSA-built binaries and sign
  # it with cosign (keyless via the GitHub OIDC token). The signature is
  # recorded in the public Rekor transparency log.
  oci:
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read    # Download release assets
      packages: write   # Push to GHCR
      id-token: write   # OIDC token for cosign keyless signing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download SLSA-built binaries from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            mkdir -p "dist/linux/${arch}"
            gh release download "$TAG" --repo "$REPO" \
              --pattern "fleeting-plugin-openstack-linux-${arch}" \
              --output "dist/linux/${arch}/plugin"
            chmod +x "dist/linux/${arch}/plugin"
          done

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install fleeting-artifact and crane
        run: |
          go install gitlab.com/gitlab-org/fleeting/fleeting-artifact/...@latest
          go install github.com/google/go-containerregistry/cmd/crane@latest

      - name: Push multi-arch OCI image
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          REPO: ${{ github.repository }}
        run: fleeting-artifact release "ghcr.io/${REPO}:${VERSION}"

      # Add OCI annotations to the manifest index so GHCR (and other
      # registries) show a description, source link, license, etc. This
      # mutation produces a new image digest, so it MUST happen before
      # cosign signs the image — otherwise the tag would end up pointing
      # at an unsigned manifest.
      - name: Annotate OCI image manifest
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          crane mutate "ghcr.io/${REPO}:${VERSION}" \
            --annotation "org.opencontainers.image.title=fleeting-plugin-openstack" \
            --annotation "org.opencontainers.image.description=GitLab fleeting plugin for OpenStack — fork of sardinasystems with hda picks plus subnet_id support" \
            --annotation "org.opencontainers.image.source=https://github.com/${REPO}" \
            --annotation "org.opencontainers.image.url=https://github.com/${REPO}" \
            --annotation "org.opencontainers.image.documentation=https://github.com/${REPO}/blob/main/README.md" \
            --annotation "org.opencontainers.image.version=${VERSION}" \
            --annotation "org.opencontainers.image.revision=${SHA}" \
            --annotation "org.opencontainers.image.licenses=Apache-2.0"

      - uses: sigstore/cosign-installer@v3

      - name: Sign image and per-arch manifests (keyless via OIDC)
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          REPO: ${{ github.repository }}
        run: cosign sign --yes --recursive "ghcr.io/${REPO}:${VERSION}"
